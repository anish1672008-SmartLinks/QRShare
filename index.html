<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>⚡ AniShare - QR File Transfer</title>

<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

<style>

body{
margin:0;
font-family:Segoe UI;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
color:white;
text-align:center;
}

.container{
margin-top:40px;
}

.card{
background:rgba(255,255,255,0.1);
backdrop-filter:blur(15px);
padding:25px;
border-radius:20px;
display:inline-block;
box-shadow:0 10px 30px rgba(0,0,0,0.5);
}

canvas{
background:white;
padding:10px;
border-radius:10px;
margin:10px;
}

button{
padding:10px 20px;
border:none;
border-radius:10px;
background:#00c6ff;
color:black;
font-weight:bold;
cursor:pointer;
margin-top:10px;
}

input{
margin-top:10px;
}

.fileBox{
margin-top:15px;
background:rgba(255,255,255,0.1);
padding:10px;
border-radius:10px;
}

#status{
margin-top:10px;
color:#00ffcc;
}

img{
max-width:200px;
display:block;
margin:auto;
margin-bottom:10px;
}

</style>
</head>

<body>

<div class="container">

<h1>⚡ AniShare</h1>

<div class="card">

<canvas id="qr"></canvas>
<p id="id"></p>

<input type="file" id="fileInput"><br>

<button onclick="sendFile()">Send File</button>

<div id="status"></div>

</div>

<h2>📥 Received Files</h2>

<div id="output"></div>

</div>

<script>

let peer = new Peer();
let conn;

let receivedChunks = [];

peer.on('open',function(id){

document.getElementById("id").innerText="Your ID: "+id;

let url = window.location.href+"?id="+id;

QRCode.toCanvas(document.getElementById("qr"),url);

});

const params = new URLSearchParams(window.location.search);
const connectTo = params.get("id");

if(connectTo){

peer.on('open',function(){

conn = peer.connect(connectTo);

conn.on('open',()=>{

document.body.innerHTML=`

<h2 style="color:black">📤 Send File</h2>

<input type="file" id="fileInput">
<br><br>
<button onclick="sendFile()">Send</button>

<div id="status"></div>

`;

});

});

}

peer.on('connection',function(connection){

conn = connection;

conn.on('data',function(data){

receivedChunks[data.index] = data.chunk;

let percent = Math.floor(((data.index+1)/data.total)*100);

document.getElementById("status").innerText =
"📥 Receiving... "+percent+"%";

if(data.index+1 === data.total){

let blob = new Blob(receivedChunks,{type:data.type});

let url = URL.createObjectURL(blob);

let div = document.createElement("div");

div.className="fileBox";

if(data.type.startsWith("image/")){

let img = document.createElement("img");

img.src = url;

div.appendChild(img);

}

let link = document.createElement("a");

link.href=url;

link.download=data.name;

link.innerText="⬇ Download "+data.name;

div.appendChild(link);

document.getElementById("output").appendChild(div);

document.getElementById("status").innerText="✅ File received!";

receivedChunks=[];

}

});

});

function sendFile(){

let file = document.getElementById("fileInput").files[0];

if(!file) return alert("Select file");

const chunkSize = 16000;

const totalChunks = Math.ceil(file.size/chunkSize);

let chunk = 0;

const reader = new FileReader();

reader.onload=function(e){

conn.send({

name:file.name,
type:file.type,
size:file.size,
chunk:e.target.result,
index:chunk,
total:totalChunks

});

chunk++;

document.getElementById("status").innerText =
"🚀 Sending "+Math.floor((chunk/totalChunks)*100)+"%";

if(chunk < totalChunks){

readSlice(chunk);

}else{

document.getElementById("status").innerText="✅ File Sent";

}

};

function readSlice(n){

const slice = file.slice(n*chunkSize,(n+1)*chunkSize);

reader.readAsArrayBuffer(slice);

}

readSlice(0);

}

</script>

</body>
</html>
