<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AniShare Lite</title>

<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

<style>
body {
  font-family: Arial;
  text-align: center;
  background: #111;
  color: white;
}
canvas {
  background: white;
  padding: 10px;
}
button {
  padding: 10px;
  margin-top: 10px;
}
</style>
</head>

<body>

<h2>📡 AniShare Lite</h2>

<canvas id="qr"></canvas>
<p id="status">Starting...</p>

<input type="file" id="fileInput"><br>
<button onclick="sendFile()">Send</button>

<h3>Received Files:</h3>
<div id="output"></div>

<script>
let peer = new Peer();
let conn;

// PC side
peer.on('open', function(id) {
  document.getElementById("status").innerText = "Scan QR to connect";

  let url = window.location.href + "?id=" + id;

  QRCode.toCanvas(document.getElementById('qr'), url);
});

// Mobile side
const params = new URLSearchParams(window.location.search);
const connectId = params.get("id");

if (connectId) {
  document.body.innerHTML = `
    <h2>Connecting...</h2>
  `;

  peer.on('open', function() {
    conn = peer.connect(connectId);

    conn.on('open', () => {
      document.body.innerHTML = `
        <h2>Connected ✅</h2>
        <input type="file" id="fileInput"><br>
        <button onclick="sendFile()">Send</button>
      `;
    });
  });
}

// Receive
peer.on('connection', function(connection) {
  conn = connection;

  conn.on('data', function(data) {

    let blob = new Blob([data.data], { type: data.type });
    let url = URL.createObjectURL(blob);

    let link = document.createElement("a");
    link.href = url;
    link.download = data.name;
    link.innerText = "Download " + data.name;

    let div = document.createElement("div");

    // Image preview
    if (data.type.startsWith("image/")) {
      let img = document.createElement("img");
      img.src = url;
      img.style.width = "150px";
      div.appendChild(img);
    }

    div.appendChild(document.createElement("br"));
    div.appendChild(link);

    document.getElementById("output").appendChild(div);
  });
});

// Send
function sendFile() {
  let file = document.getElementById("fileInput").files[0];
  if (!file) return alert("Select file");

  let reader = new FileReader();

  reader.onload = function() {
    conn.send({
      name: file.name,
      type: file.type,
      data: reader.result
    });
  };

  reader.readAsArrayBuffer(file);
}
</script>

</body>
</html>
